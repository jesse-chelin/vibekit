# Cloudflare Tunnel configuration
# This file is generated by scripts/setup-cloudflare.sh
# You can also edit it manually.
#
# The tunnel name and credentials are managed via the CLOUDFLARE_TUNNEL_TOKEN
# environment variable, so this config only defines routing rules.

# Tunnel name (informational — the actual tunnel is identified by the token)
tunnel: vibekit

ingress:
  # Route your domain to the app container
  # Replace "your-domain.com" with your actual domain
  - hostname: your-domain.com
    service: http://app:3000
    originRequest:
      noTLSVerify: true

  # Health check endpoint for monitoring
  - hostname: your-domain.com
    path: /api/health
    service: http://app:3000

  # Catch-all: return 404 for unmatched requests
  - service: http_status:404
